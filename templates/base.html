<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dashboard{% endblock %} - SignalVerse</title>
  
  <link rel="shortcut icon" href="{{ url_for('static', filename='Image/favico.png') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/pastel.css') }}" />
</head>
<body>
  <!-- Decorative background shapes for glassmorphism effect -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>Signal</span>Verse
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.path == '/' or request.path == '/answer' %}active{% endif %}">Traffic Signals</a>
      <a href="/bdib_bp/" class="nav-link {% if 'bdib' in request.path %}active{% endif %}">Organic Farming</a>
      <a href="/nchrp_bp/" class="nav-link {% if 'nchrp' in request.path %}active{% endif %}">Transportation</a>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
